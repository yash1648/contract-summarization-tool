<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Analysis Results', ~{::content})}">
<body>
<th:block th:fragment="content">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="fw-bold mb-0 text-white">
            <i class="bi bi-bar-chart-line me-2" style="color:var(--accent);"></i>All Analysis Results
        </h2>
        <a th:href="@{/analysis}" class="btn btn-outline-primary">
            <i class="bi bi-plus-circle me-1"></i>New Analysis
        </a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Contract</th>
                        <th>Risk Score</th>
                        <th>Level</th>
                        <th>Flags</th>
                        <th>Analysed At</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${results.empty}">
                        <td colspan="6" class="text-center py-5 text-muted">No analyses yet.</td>
                    </tr>
                    <tr th:each="r : ${results}">
                        <td>
                            <a th:href="@{/contracts/{id}(id=${r.contractId})}"
                               th:text="${r.fileName}">file.pdf</a>
                        </td>
                        <td>
                            <span class="fw-semibold"
                                  th:text="${#numbers.formatDecimal(r.riskScore, 1, 1)}">0.0</span>
                            <span class="text-muted small ms-1">/10.0</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${r.riskScore <= 3.3 ? 'badge-low' : (r.riskScore <= 6.6 ? 'badge-medium' : 'badge-high')}"
                                  th:text="${r.riskLevel}">LOW</span>
                        </td>
                        <td>
                            <span th:text="${r.riskReport != null ? r.riskReport.totalFlags() : 0}">0</span>
                            <span class="text-muted small ms-1" th:if="${r.riskReport != null}"
                                  th:text="|(${r.riskReport.penaltyClauses.size()} P, ${r.riskReport.terminationRisks.size()} T, ${r.riskReport.liabilityIssues.size()} L)|">
                            </span>
                        </td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(r.analyzedAt, 'dd MMM yyyy HH:mm')}">-</td>
                        <td class="text-end">
                            <a th:href="@{/analysis/{id}/results(id=${r.contractId})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> View
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
