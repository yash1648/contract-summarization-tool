<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Analysis Results', ~{::content})}">
<body>
<th:block th:fragment="content">
<h2 class="fw-bold mb-4" style="color:#0d1b2a;">
    <i class="bi bi-bar-chart-line me-2" style="color:#00b4d8;"></i>All Analysis Results
</h2>
<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Contract</th>
                    <th>Risk Score</th>
                    <th>Level</th>
                    <th>Flags</th>
                    <th>Analysed At</th>
                    <th class="text-end">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${results.empty}">
                    <td colspan="6" class="text-center py-5 text-muted">No analyses yet.</td>
                </tr>
                <tr th:each="r : ${results}">
                    <td th:text="${r.contractFileName}">file.pdf</td>
                    <td th:text="${#numbers.formatDecimal(r.riskScore, 1, 1)}">0.0</td>
                    <td>
                        <span class="badge"
                              th:classappend="${r.riskScore <= 3.3 ? 'badge-low' : (r.riskScore <= 6.6 ? 'badge-medium' : 'badge-high')}"
                              th:text="${r.riskLevel}">LOW</span>
                    </td>
                    <td th:text="${r.riskReport != null ? r.riskReport.totalFlags() : 0}">0</td>
                    <td class="text-muted small"
                        th:text="${#temporals.format(r.analyzedAt, 'dd MMM yyyy HH:mm')}">-</td>
                    <td class="text-end">
                        <a th:href="@{/analysis/{id}/results(id=${r.contractId})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-eye"></i> View
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</th:block>
</body>
</html>
