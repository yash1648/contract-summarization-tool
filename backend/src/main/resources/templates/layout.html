<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)"
      data-bs-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | AI Contract Summarizer'">AI Contract Summarizer</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent:  #3b82f6;
            --accent-hover: #2563eb;
            --gold:    #f59e0b;
            --danger:  #ef4444;
            --success-bg: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bg-body: #020617;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        body { 
            background: var(--bg-body); 
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(245, 158, 11, 0.1), transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif; 
        }
        h1, h2, h3, h4, h5, h6, .brand {
            font-family: 'Outfit', sans-serif;
        }
        .sidebar { 
            width: 260px; 
            min-height: 100vh; 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            box-shadow: 4px 0 24px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        .sidebar .nav-link { 
            color: var(--text-muted); 
            border-radius: 10px; 
            margin: 4px 12px; 
            padding: 10px 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { 
            background: rgba(59, 130, 246, 0.15); 
            color: var(--accent); 
            transform: translateX(4px);
        }
        .sidebar .brand { 
            color: var(--text-main); 
            font-weight: 800; 
            font-size: 1.4rem; 
            letter-spacing: -0.5px;
        }
        .sidebar .brand span { 
            color: var(--accent); 
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-content { 
            flex: 1; 
            padding: 2.5rem; 
            overflow-y: auto;
            height: 100vh;
        }
        .card, .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: var(--text-main);
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            border-color: rgba(59, 130, 246, 0.3);
        }
        .stat-card { border-left: 4px solid var(--accent); }
        .badge-low    { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.4); }
        .badge-medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.4); }
        .badge-high   { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); }
        .status-pill  { font-size: .75rem; padding: 4px 12px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-COMPLETED  { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .status-PENDING_AI { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .status-FAILED     { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .status-UPLOADED   { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .status-ANALYZING  { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
        .chunk-preview { 
            background: rgba(0, 0, 0, 0.3); 
            color: #cbd5e1; 
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-family: 'Inter', monospace; 
            font-size: .85rem; 
            padding: 1.25rem; 
            line-height: 1.6;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #2563eb);
            border: none;
            border-radius: 8px;
            font-weight: 500;
            padding: 10px 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }
        .table {
            color: var(--text-main);
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-main);
            --bs-table-border-color: var(--glass-border);
        }
        .table-hover tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }
        .table th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            border-bottom-width: 1px;
        }
        .table td {
            vertical-align: middle;
        }
        .form-control, .form-select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
            color: var(--text-main);
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
        .text-muted {
            color: var(--text-muted) !important;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
        
        .todo-banner { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 12px; padding: 1.25rem; color: #fbbf24; }
    </style>
</head>
<body class="d-flex">

<!-- Sidebar -->
<nav class="sidebar d-flex flex-column p-3">
    <div class="brand mb-4 ps-2 pt-2">
        <i class="bi bi-file-earmark-text-fill me-2"></i>Contract<span>AI</span>
    </div>
    <ul class="nav flex-column gap-1">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/dashboard}">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/contracts/upload}">
                <i class="bi bi-upload me-2"></i>Upload Contract
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/contracts}">
                <i class="bi bi-folder2-open me-2"></i>All Contracts
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/analysis}">
                <i class="bi bi-bar-chart-line me-2"></i>Analysis Results
            </a>
        </li>
    </ul>
    <div class="mt-auto ps-2 pb-2" style="color:#4a6080;font-size:.75rem;">
        <div>SY B.Tech 2024–25</div>
        <div style="color:#2a3f58;">RAG-Based Legal AI</div>
    </div>
</nav>

<!-- Main -->
<div class="main-content">
    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show position-fixed top-0 end-0 m-3 z-50" style="max-width: 400px;">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show position-fixed top-0 end-0 m-3 z-50" style="max-width: 400px;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Page content injected here -->
    <div th:replace="${content}">Page content goes here</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Highlight active sidebar link
    document.querySelectorAll('.sidebar .nav-link').forEach(link => {
        if (link.href === window.location.href) link.classList.add('active');
    });
</script>
</body>
</html>
