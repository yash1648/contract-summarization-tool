<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | AI Contract Summarizer'">AI Contract Summarizer</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --primary: #0d1b2a;
            --accent:  #00b4d8;
            --gold:    #ffb300;
            --danger:  #e53935;
            --success-bg: #d4edda;
        }
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: 240px; min-height: 100vh; background: var(--primary); }
        .sidebar .nav-link { color: #90a4be; border-radius: 6px; margin: 2px 8px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(0,180,216,.15); color: var(--accent); }
        .sidebar .brand { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
        .sidebar .brand span { color: var(--gold); }
        .main-content { flex: 1; padding: 2rem; }
        .stat-card { border-left: 4px solid var(--accent); border-radius: 8px; }
        .badge-low    { background: #198754; color: #fff; }
        .badge-medium { background: #fd7e14; color: #fff; }
        .badge-high   { background: #dc3545; color: #fff; }
        .status-pill  { font-size: .75rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
        .status-COMPLETED  { background:#d4edda; color:#155724; }
        .status-PENDING_AI { background:#fff3cd; color:#856404; }
        .status-FAILED     { background:#f8d7da; color:#721c24; }
        .status-UPLOADED   { background:#d1ecf1; color:#0c5460; }
        .status-ANALYZING  { background:#cce5ff; color:#004085; }
        .chunk-preview { background:#1b3a5c; color:#e8edf5; border-radius:6px;
                         font-family:monospace; font-size:.85rem; padding:1rem; }
        .todo-banner { background:#fff3cd; border:1px solid #ffc107;
                       border-radius:8px; padding:1rem; }
    </style>
</head>
<body class="d-flex">

<!-- Sidebar -->
<nav class="sidebar d-flex flex-column p-3">
    <div class="brand mb-4 ps-2 pt-2">
        <i class="bi bi-file-earmark-text-fill me-2"></i>Contract<span>AI</span>
    </div>
    <ul class="nav flex-column gap-1">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/dashboard}">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/contracts/upload}">
                <i class="bi bi-upload me-2"></i>Upload Contract
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/contracts}">
                <i class="bi bi-folder2-open me-2"></i>All Contracts
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/analysis}">
                <i class="bi bi-bar-chart-line me-2"></i>Analysis Results
            </a>
        </li>
    </ul>
    <div class="mt-auto ps-2 pb-2" style="color:#4a6080;font-size:.75rem;">
        <div>SY B.Tech 2024–25</div>
        <div style="color:#2a3f58;">RAG-Based Legal AI</div>
    </div>
</nav>

<!-- Main -->
<div class="main-content">
    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Page content injected here -->
    <div th:replace="${content}">Page content goes here</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Highlight active sidebar link
    document.querySelectorAll('.sidebar .nav-link').forEach(link => {
        if (link.href === window.location.href) link.classList.add('active');
    });
</script>
</body>
</html>
