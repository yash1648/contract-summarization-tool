<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Error', ~{::content})}">
<body>
<th:block th:fragment="content">
    <div class="text-center py-5">
        <div class="display-1 fw-bold text-danger" th:text="${statusCode}">500</div>
        <h2 class="mt-3" th:text="${errorTitle}">Error</h2>
        <p class="text-muted" th:text="${errorMessage}">Something went wrong.</p>
        <div class="mt-4">
            <a th:href="@{/dashboard}" class="btn btn-outline-primary me-2">
                <i class="bi bi-house me-1"></i>Back to Dashboard
            </a>
            <button onclick="window.location.reload()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-clockwise me-1"></i>Retry
            </button>
        </div>
        <div class="mt-5 pt-4 border-top text-muted small">
            <p class="mb-1">Troubleshooting:</p>
            <ul class="mb-0">
                <li>Check server logs for detailed error information</li>
                <li>Verify AI service is running (if analysis features used)</li>
                <li>Ensure MongoDB is accessible</li>
                <li>Confirm uploaded files are valid PDFs or DOCX documents</li>
            </ul>
        </div>
    </div>
</th:block>
</body>
</html>
