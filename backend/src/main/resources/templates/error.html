<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Error', ~{::content})}">
<body>
<th:block th:fragment="content">
<div class="text-center py-5">
    <div class="display-1 fw-bold text-danger" th:text="${statusCode}">500</div>
    <h2 class="mt-3" th:text="${errorTitle}">Error</h2>
    <p class="text-muted" th:text="${errorMessage}">Something went wrong.</p>
    <a th:href="@{/dashboard}" class="btn btn-primary mt-3">
        <i class="bi bi-house me-1"></i>Back to Dashboard
    </a>
</div>
</th:block>
</body>
</html>
