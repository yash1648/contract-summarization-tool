spring:
  application:
    name: ai-assistant-backend

# MongoDB

  mongodb:
    uri: ${MONGODB_URI:mongodb://admin:password@localhost:27017/ai_assistant_db?authSource=admin}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
      enabled: true

  # Thymeleaf
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

# Logging level
logging:
  level:
    root: INFO
    com.grim: DEBUG
    org.springframework.data.mongodb: WARN
    org.springframework.web.reactive.function.client: WARN

# File type
app:
  upload:
    dir: /home/grim/Project/ai-contract-system/uploads
    allowed-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document

  # Chunking — larger chunks = fewer total = fewer embeddings = faster
  chunking:
    size: 2500
    overlap: 100

  # Python AI service
  ai:
    service:
      url: http://localhost:5000
      enabled: true
      timeout-seconds: 1200
      health-timeout-seconds: 5
      max-retries: 0
      retry-delay-ms: 1000
      use-extraction-first: true

# Server port
server:
  port: 6969
  tomcat:
    threads:
      max: 50
