spring:
  application:
    name: ai-assistant-backend

  #  mongo db
  mongodb:
    uri: mongodb://admin:password@localhost:27017/ai_assistant_db?authSource=admin

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
      enabled: true

  # Thymleaf
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  # Logging level
logging:
  level:
    root: INFO
    com.grim: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.web.reactive.function.client: WARN

# File type

app:
  upload:
    dir: /home/grim/Project/ai-contract-system/uploads
    allowed-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document



  #Chunking
  chunking:
      size: 1600
      overlap: 200
  # Python ai service
  ai:
    service:
        url: http://localhost:5000
        enabled: true
        timeout-seconds: 30
        health-timeout-seconds: 5
        max-retries: 2
        retry-delay-ms: 1000



# Server port

server:
  port: 6969

